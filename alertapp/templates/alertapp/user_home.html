{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard - Early Outbreak Alert System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <style>
        body, html { height: 100%; }
        .center-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #b6d0e2 0%, #e0eafc 100%);
        }
        .dashboard-box {
            padding: 2.5rem 3rem;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid #e3e6f0;
        }
        .dashboard-btn {
            margin: 0 18px;
            width: 140px;
            height: 140px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: normal;
        }
        .dashboard-btn:hover, .dashboard-btn:focus {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.13);
            opacity: 0.95;
        }
        .dashboard-box h2 {
            font-weight: 700;
            color: #2d3a4b;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
        }
        .btn-row-horizontal {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(90deg, #e0eafc 0%, #cfdef3 100%);
            padding: 1.5rem 0;
            border-radius: 20px;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 900px) {
            .dashboard-btn {
                width: 110px;
                height: 110px;
                font-size: 0.95rem;
                margin: 0 8px;
            }
        }
        @media (max-width: 600px) {
            .btn-row-horizontal {
                flex-direction: column;
                gap: 12px;
                padding: 1rem 0;
            }
            .dashboard-btn {
                width: 90vw;
                height: 60px;
                margin: 8px 0;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="center-container">
        <div class="dashboard-box text-center">
            <h2 class="mb-4">Welcome, {{ user.username }}</h2>
            <div class="btn-row-horizontal">
                <a href="{% url 'upload' %}" class="btn btn-primary dashboard-btn">Upload<br>Dataset</a>
                <a href="{% url 'preprocess' %}" class="btn btn-secondary dashboard-btn">Preprocess<br>Dataset</a>
                <a href="{% url 'mlalgorithm' %}" class="btn btn-info dashboard-btn">ML<br>Algorithm</a>
                <a href="{% url 'best_algorithm' %}" class="btn btn-success dashboard-btn">Best of All<br>Algorithm</a>
                <a href="{% url 'graphical_report' %}" class="btn btn-warning dashboard-btn">Graphical<br>Report</a>
                <a href="{% url 'prediction' %}" class="btn btn-success dashboard-btn">Prediction</a>
                <a href="{% url 'logout' %}" class="btn btn-danger dashboard-btn">Logout</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
