<!-- filepath: alertapp/templates/alertapp/mlalgorithm.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML Algorithms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card mx-auto" style="max-width: 500px;">
            <div class="card-body text-center">
                <h2 class="card-title mb-4">Choose ML Algorithm</h2>
                <a href="{% url 'run_algorithm' 'logistic' %}" class="btn btn-info mb-2 w-100">Logistic Regression</a>
                <a href="{% url 'run_algorithm' 'randomforest' %}" class="btn btn-info mb-2 w-100">Random Forest</a>
                <a href="{% url 'run_algorithm' 'svm' %}" class="btn btn-info mb-2 w-100">SVM</a>
                <a href="{% url 'run_algorithm' 'knn' %}" class="btn btn-info mb-2 w-100">KNN</a>
                <a href="{% url 'user_home' %}" class="btn btn-secondary mt-3 w-100">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
