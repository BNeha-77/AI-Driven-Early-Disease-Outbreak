<!-- filepath: alertapp/templates/alertapp/best_algorithm.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Best Algorithm Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card mx-auto" style="max-width: 600px;">
            <div class="card-body text-center">
                <h2 class="card-title mb-4">Best Algorithm: {{ algo_name }}</h2>
                <p class="fs-5">Accuracy: <strong>{{ accuracy|floatformat:2 }}</strong></p>
                <h5>Confusion Matrix</h5>
                <pre>{{ confusion_matrix }}</pre>
                <h5>Classification Report</h5>
                <pre>{{ classification_report }}</pre>
                <a href="{% url 'user_home' %}" class="btn btn-primary mt-3">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
