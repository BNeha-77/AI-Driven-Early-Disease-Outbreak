<!-- filepath: alertapp/templates/alertapp/graphical_report.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Graphical Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card mx-auto" style="max-width: 700px;">
            <div class="card-body text-center">
                <h2 class="card-title mb-4">Graphical Report</h2>
                <h5>Pie Chart</h5>
                <img src="data:image/png;base64,{{ pie_chart }}" class="img-fluid mb-4" alt="Pie Chart">
                <h5>Line Chart</h5>
                <img src="data:image/png;base64,{{ line_chart }}" class="img-fluid mb-4" alt="Line Chart">
                <h5>Accuracies</h5>
                <ul class="list-group">
                    {% for name, acc in accuracies.items %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ name }}
                            <span class="badge bg-primary rounded-pill">{{ acc|floatformat:2 }}</span>
                        </li>
                    {% endfor %}
                </ul>
                <a href="{% url 'user_home' %}" class="btn btn-primary mt-3">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
