{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Early Outbreak Alert System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <style>
        body, html { height: 100%; }
        .center-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
        }
        .btn-group-custom .btn {
            min-width: 140px;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="center-container">
        <div class="text-center">
            <h1 class="mb-4">Early Outbreak Alert System</h1>
            <div class="btn-group-custom mb-3">
                <a href="/admin/" class="btn btn-primary btn-lg">Admin</a>
                <a href="{% url 'login' %}" class="btn btn-success btn-lg">Login</a>
                <a href="{% url 'register' %}" class="btn btn-outline-primary btn-lg">Register</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
